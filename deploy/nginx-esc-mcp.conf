# Nginx reverse proxy for ESC MCP server
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled/
#
# Prerequisites:
#   - SSL cert (Let's Encrypt via certbot, or self-signed)
#   - MCP server running on port 8080 (ESC_TRANSPORT=sse ESC_PORT=8080)
#   - Set ESC_API_KEY env var on the MCP server
#
# The API key is validated by checking the Authorization header:
#   Authorization: Bearer <your-shared-key>

server {
    listen 443 ssl;
    server_name esc-mcp.yourdomain.com;  # Replace with your domain or use IP

    ssl_certificate /etc/letsencrypt/live/esc-mcp.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/esc-mcp.yourdomain.com/privkey.pem;

    # API key validation at nginx level
    # Clients must send: Authorization: Bearer <ESC_API_KEY>
    set $expected_key "REPLACE_WITH_YOUR_API_KEY";

    location / {
        # Check API key
        if ($http_authorization != "Bearer ${expected_key}") {
            return 401 '{"error": "unauthorized", "message": "Invalid or missing API key"}';
        }

        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # SSE support — disable buffering for streaming
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout for SSE connections
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name esc-mcp.yourdomain.com;
    return 301 https://$server_name$request_uri;
}
